production:
  scheduler:
    class: SchedulerJob
    schedule: "* * * * *"
    queue: default
    description: "Check enabled pipelines and enqueue due runs every minute"

  wizard_draft_cleanup:
    class: Evaluation::WizardDraftCleanupJob
    schedule: "0 */6 * * *"
    queue: default
    description: "Delete expired evaluation wizard drafts every 6 hours"

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
    description: "Prune finished Solid Queue job records to keep the queue table lean"
