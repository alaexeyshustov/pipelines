# Solid Queue recurring tasks configuration.
# Requires Solid Queue as the queue adapter.
# See https://github.com/rails/solid_queue#recurring-tasks

production:
  scheduler:
    class: SchedulerJob
    schedule: "* * * * *"
    queue: default
    description: "Check enabled pipelines and enqueue due runs every minute"

  wizard_draft_cleanup:
    class: Evaluation::WizardDraftCleanupJob
    schedule: "0 */6 * * *"
    queue: default
    description: "Delete expired evaluation wizard drafts every 6 hours"
