# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
    # Raised from the shared 5000ms default (defense-in-depth): mutation testing
    # forks multiple worker processes that share this on-disk DB, and a longer
    # busy-timeout gives SQLite's own retry loop more room before raising
    # SQLite3::BusyException under contention. See docs/claude/gotchas.md.
    timeout: 15000
    pragmas: &wal_pragmas
      journal_mode: wal
      synchronous: normal
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
    timeout: 15000
    pragmas: *wal_pragmas

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_PATH", "storage/production.sqlite3") %>
  queue:
    <<: *default
    database: <%= ENV.fetch("QUEUE_DATABASE_PATH", "storage/production_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
