<svg width="560" height="190" viewBox="0 0 560 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arr1" viewBox="0 0 8 6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1" opacity="0.9"/>
    </marker>
    <marker id="arr2" viewBox="0 0 8 6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8B5CF6" opacity="0.9"/>
    </marker>
    <marker id="arr3" viewBox="0 0 8 6" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#A855F7" opacity="0.9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="190" rx="16" fill="url(#bg)"/>

  <!-- Connecting lines -->
  <line x1="92" y1="80" x2="175" y2="80" stroke="#6366F1" stroke-width="1.8" marker-end="url(#arr1)" opacity="0.8"/>
  <line x1="235" y1="80" x2="317" y2="80" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#arr2)" opacity="0.8"/>
  <line x1="377" y1="80" x2="460" y2="80" stroke="#A855F7" stroke-width="1.8" marker-end="url(#arr3)" opacity="0.8"/>

  <!-- Step labels -->
  <text x="66"  y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563" letter-spacing="1">FETCH</text>
  <text x="209" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563" letter-spacing="1">CLASSIFY</text>
  <text x="351" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563" letter-spacing="1">STORE</text>
  <text x="494" y="45" text-anchor="middle" font-family="monospace" font-size="9" fill="#4B5563" letter-spacing="1">UPLOAD</text>

  <!-- Node 1: Fetch emails — blue -->
  <circle cx="66" cy="80" r="26" fill="#1A2235" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="66" cy="80" r="26" fill="none" stroke="#3B82F6" stroke-width="4" opacity="0.15" filter="url(#glow)"/>
  <g transform="translate(66,80)">
    <rect x="-13" y="-9" width="26" height="18" rx="2" fill="none" stroke="#3B82F6" stroke-width="1.4"/>
    <polyline points="-13,-7 0,3 13,-7" fill="none" stroke="#3B82F6" stroke-width="1.4"/>
  </g>

  <!-- Node 2: AI Classify — indigo -->
  <circle cx="209" cy="80" r="26" fill="#1A2235" stroke="#6366F1" stroke-width="1.5"/>
  <circle cx="209" cy="80" r="26" fill="none" stroke="#6366F1" stroke-width="4" opacity="0.15" filter="url(#glow)"/>
  <g transform="translate(209,80)">
    <path d="M4,-14 L-6,2 L2,2 L-4,14 L9,-2 L1,-2 Z" fill="#6366F1"/>
  </g>

  <!-- Node 3: Store to DB — purple -->
  <circle cx="351" cy="80" r="26" fill="#1A2235" stroke="#8B5CF6" stroke-width="1.5"/>
  <circle cx="351" cy="80" r="26" fill="none" stroke="#8B5CF6" stroke-width="4" opacity="0.15" filter="url(#glow)"/>
  <g transform="translate(351,80)">
    <ellipse cx="0" cy="-8" rx="10" ry="4" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
    <line x1="-10" y1="-8" x2="-10" y2="8" stroke="#8B5CF6" stroke-width="1.4"/>
    <line x1="10"  y1="-8" x2="10"  y2="8" stroke="#8B5CF6" stroke-width="1.4"/>
    <ellipse cx="0" cy="8"  rx="10" ry="4" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
    <path d="M-10,0 Q0,4 10,0" fill="none" stroke="#8B5CF6" stroke-width="1.4"/>
  </g>

  <!-- Node 4: Upload — violet -->
  <circle cx="494" cy="80" r="26" fill="#1A2235" stroke="#A855F7" stroke-width="1.5"/>
  <circle cx="494" cy="80" r="26" fill="none" stroke="#A855F7" stroke-width="4" opacity="0.15" filter="url(#glow)"/>
  <g transform="translate(494,80)">
    <line x1="0" y1="8"  x2="0"  y2="-6" stroke="#A855F7" stroke-width="1.8" stroke-linecap="round"/>
    <polyline points="-6,-2 0,-9 6,-2" fill="none" stroke="#A855F7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-8" y1="11" x2="8" y2="11" stroke="#A855F7" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="280" y="148" text-anchor="middle"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="23" font-weight="700" fill="#E6EDF3" letter-spacing="0.5">Application Pipeline</text>

  <!-- Subtitle -->
  <text x="280" y="171" text-anchor="middle"
    font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
    font-size="9.5" fill="#586069" letter-spacing="4">MULTI-AGENT · AI-POWERED</text>
</svg>
