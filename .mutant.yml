integration: rspec
usage: opensource
jobs: 4
# Minimum mutation score threshold: 90% (MUTATION_SCORE_THRESHOLD in .github/workflows/mutation.yml)
# Raise MUTATION_SCORE_THRESHOLD after establishing a stable baseline.
# NOTE (2026-07-11, RALPLAN-DR v2.1): jobs here is kept in sync with the
# workflow's actual `--jobs` value (4) -- see spec/mutant_helper.rb for the
# per-worker DB isolation that makes --jobs 4 safe from SQLite lock
# contention. The ~3.2% false-neutral-failure rate for mutant's
# "neutral"-type mutations under this isolation that previously blocked
# re-baselining is now resolved (root cause: an at_exit hook inherited by
# mutant's nested killforks -- see spec/mutant_helper.rb and
# docs/claude/gotchas.md). Re-baselining MUTATION_SCORE_THRESHOLD itself is
# still a separate follow-up step, not done here.
includes:
  - app/agents
  - app/controllers
  - app/helpers
  - app/jobs
  - app/models
  - app/services
  - app/tools
  - lib
  - spec
requires:
  - rspec/core
  - mutant_helper
matcher:
  subjects:
    - Application*
    - Emails*
    - Records*
    - Orchestration*
    - Interview*
    - EmailVector*
    - SqliteVecExtension*
  ignore:
    - ApplicationMailsSchema*
    - Pipeline*
    # I/O-heavy adapter/auth classes: unit tests exist but network-boundary mutations produce noise, not signal.
    # GmailAdapter/YahooAdapter wrap Google::Apis/Net::IMAP calls; GmailAuth opens a raw TCPServer/HTTP OAuth callback listener.
    - Emails::Adapters::GmailAdapter*
    - Emails::Adapters::YahooAdapter*
    - Emails::GmailAuth*
    # ImapBodyParser, GmailBodyExtractor, GmailPaginator, GmailMessageParser, YahooMessageParser were
    # previously (and incorrectly) ignored as "network noise" -- they are pure MIME/header-parsing and
    # pagination-control logic with no I/O, so they've been removed from this list and are deliberately
    # back in mutation scope. Follow up if they surface real test gaps once mutation testing re-runs.
    # AI classifier classes: LLM-boundary mutations produce noise, not signal
    - Emails::ClassifyAgent*
    - Emails::ClassifyTool*
    # Controllers: UI routing layer, low mutation testing value
    - ApplicationController*
    - ApplicationMailsController*
    - InterviewsController*
    - Orchestration::ActionsController*
    - Orchestration::AgentsController*
    - Orchestration::AllPipelineRunsController*
    - Orchestration::PipelineRunsController*
    - Orchestration::PipelinesController*
    - Orchestration::SchemaBuildersController*
    - Orchestration::StepActionsController*
    - Orchestration::StepsController*
