integration: rspec
usage: opensource
jobs: 4
# Minimum mutation score threshold: 90% (MUTATION_SCORE_THRESHOLD in .github/workflows/mutation.yml)
# Raise MUTATION_SCORE_THRESHOLD after establishing a stable baseline.
# NOTE (2026-07-11, RALPLAN-DR v2.1): jobs here is kept in sync with the
# workflow's actual `--jobs` value (4) -- see spec/mutant_helper.rb for the
# per-worker DB isolation that makes --jobs 4 safe from SQLite lock
# contention. Re-baselining the threshold is still blocked on a known,
# unresolved ~3.2% false-neutral-failure rate for mutant's "neutral"-type
# mutations under this isolation (see spec/mutant_helper.rb's "KNOWN
# LIMITATION" comment) -- do not raise this threshold until that is fixed
# or otherwise accounted for, or a stable baseline will be measured against
# noise.
includes:
  - app/agents
  - app/controllers
  - app/helpers
  - app/jobs
  - app/models
  - app/services
  - app/tools
  - lib
  - spec
requires:
  - rspec/core
  - mutant_helper
matcher:
  subjects:
    - Application*
    - Emails*
    - Records*
    - Orchestration*
    - Interview*
    - EmailVector*
    - SqliteVecExtension*
  ignore:
    - ApplicationMailsSchema
    - Pipeline
    # I/O-heavy adapter classes: unit tests exist but network-boundary mutations produce noise, not signal
    - Emails::Adapters::GmailAdapter
    - Emails::Adapters::YahooAdapter
    - Emails::Adapters::ImapBodyParser
    - Emails::Adapters::GmailBodyExtractor
    - Emails::Adapters::GmailPaginator
    - Emails::Adapters::GmailMessageParser
    - Emails::Adapters::YahooMessageParser
    - Emails::GmailAuth
    # AI classifier classes: LLM-boundary mutations produce noise, not signal
    - Emails::ClassifyAgent
    - Emails::ClassifyTool
    # Controllers: UI routing layer, low mutation testing value
    - ApplicationController
    - ApplicationMailsController
    - InterviewsController
    - Orchestration::ActionsController
    - Orchestration::AgentsController
    - Orchestration::AllPipelineRunsController
    - Orchestration::PipelineRunsController
    - Orchestration::PipelinesController
    - Orchestration::SchemaBuildersController
    - Orchestration::StepActionsController
    - Orchestration::StepsController
