services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: pipelines:latest
    ports:
      - "3000:3000"
    volumes:
      - storage:/app/storage
    env_file: ../.env.local
    environment:
      RAILS_ENV: production
      DATABASE_PATH: /app/storage/production.sqlite3
      QUEUE_DATABASE_PATH: /app/storage/production_queue.sqlite3

  jobs:
    image: pipelines:latest
    command: bin/jobs -c config/queue.yml
    volumes:
      - storage:/app/storage
    env_file: ../.env.local
    environment:
      RAILS_ENV: production
      DATABASE_PATH: /app/storage/production.sqlite3
      QUEUE_DATABASE_PATH: /app/storage/production_queue.sqlite3
    depends_on:
      - web

volumes:
  storage:
