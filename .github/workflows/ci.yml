name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: corepack enable pnpm && pnpm install

      - name: Run ESLint
        run: pnpm lint

      - name: Check Prettier formatting
        run: pnpm format:check

      - name: Run pnpm audit
        run: pnpm audit

  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

  steep:
    name: Steep Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install RBS collection
        run: bundle exec rbs collection install

      - name: Validate RBS signatures
        run: bundle exec rbs  -r optparse validate sig/**/*.rbs sig/**/**/*.rbs sig/**/**/**/*.rbs

      - name: Check RBS signatures are up to date
        run: bundle exec sentinel check

      - name: Run Steep
        run: bundle exec steep check

  brakeman:
    name: Brakeman
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager

  rspec:
    name: RSpec
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      COVERAGE: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: corepack enable pnpm && pnpm install

      - name: Build assets
        run: pnpm run build && bundle exec rails tailwindcss:build

      - name: Run RSpec
        run: bundle exec rspec

  rubycritic:
    name: RubyCritic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run RubyCritic
        run: bundle exec rubycritic --no-browser --format console app/ lib/

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run mutation testing
        run: |
          bundle exec mutant run --since origin/main --jobs 2 2>&1 | tee mutant_output.txt || true
          score=$(grep "Coverage:" mutant_output.txt | grep -v "Line Coverage" | grep -oE '[0-9]+(\.[0-9]+)?%' | tr -d '%')
          echo "Mutation score: ${score}%"
          if [ -z "$score" ]; then
            echo "No changed subjects matched — skipping threshold check"
            exit 0
          fi
          awk -v s="$score" -v t="90.0" \
            'BEGIN { if (s+0 < t+0) { print "::error::Mutation score " s "% is below the 90% minimum threshold"; exit 1 } }'
