detectors:
  IrresponsibleModule:
    enabled: false
  TooManyStatements:
    enabled: true
    exclude:
      - initialize
    max_statements: 8
  LongParameterList:
    enabled: true
    max_params: 5
  DataClump:
    enabled: true
    min_clump_size: 3
  ControlParameter:
    enabled: false

directories:
  "app/controllers":
    InstanceVariableAssumption:
      enabled: false