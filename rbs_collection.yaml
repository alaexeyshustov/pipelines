# Download sources
sources:
  - type: git
    name: ruby/gem_rbs_collection
    remote: https://github.com/ruby/gem_rbs_collection.git
    revision: main
    repo_dir: gems

# You can specify local directories as sources also.
# - type: local
#   path: path/to/your/local/repository

# A directory to install the downloaded RBSs
path: .gem_rbs_collection

gems:
  # No RBS definitions available in gem_rbs_collection
  - name: random-formatter
    ignore: true
  # pagy bundles Relation[T] (1 param) which conflicts with the collection's
  # activerecord 8.0 that defines Relation with 0 params → GenericParameterMismatchError
  - name: pagy
    ignore: true
#  - name: activerecord
#    ignore: true
#  - name: activestorage
#    ignore: true
